name: corestack-backend

channels:
  - conda-forge

dependencies:
  - python=3.11

  # Django
  - django=5.2
  - djangorestframework
  - django-cors-headers
  - drf-yasg

  # Database
  - psycopg2
  - sqlalchemy

  # Celery (modern)
  - celery=5.3
  - redis-py

  # Geo stack (LET CONDA RESOLVE)
  - geopandas
  - rasterio
  - shapely
  - pyproj
  - fiona
  - gdal
  - rioxarray
  - xarray

  # Earth Engine
  - earthengine-api
  - geemap
  - geetools

  # Data
  - numpy
  - pandas
  - scipy
  - scikit-learn
  - matplotlib

  # Cloud
  - boto3
  - google-cloud-storage

  - pip
  - pip:
      - django-environ
      - djangorestframework-simplejwt
      - drf-nested-routers
      - django-celery-beat
      - django-celery-results
      - pymannkendall
      - pystac
      - emoji
      - webdriver-manager