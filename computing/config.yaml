# Local compute dependency manifest.

base_layers:
    inputs:
        - path: data/base_layers/lulc/lulc_v3_2017_2018.tif
          source: google_drive
          gdrive_id: 1VidwEQqkwtoHqqdUqdwURWyiGd-OteaJ
        - path: data/base_layers/lulc/lulc_v3_2018_2019.tif
          source: google_drive
          gdrive_id: 1ZeLMAiBfolMrfEJkFnOlvb8OjSqC9vHP
        - path: data/base_layers/lulc/lulc_v3_2019_2020.tif
          source: google_drive
          gdrive_id: 1gx5VwJCHI-WUDJIwWv48OvbybBe9y0PR
        - path: data/base_layers/lulc/lulc_v3_2020_2021.tif
          source: google_drive
          gdrive_id: 1xbOt3-t1Ws5olq2Q88Tk32KnUVNKUXqe
        - path: data/base_layers/lulc/lulc_v3_2021_2022.tif
          source: google_drive
          gdrive_id: 1m8ZnUBbTp-fcH_JcRTUEceRaa8WewQmz
        - path: data/base_layers/lulc/lulc_v3_2022_2023.tif
          source: google_drive
          gdrive_id: 1_S0VESClg7s-DloAqxrfU8mLHhNSBfp7
        - path: data/base_layers/lulc/lulc_v3_2023_2024.tif
          source: google_drive
          gdrive_id: 1JVfl67ARRv7TPV5lyLnjoSfWDiXtvXjY
        - path: data/base_layers/lulc/lulc_v3_2024_2025.tif
          source: google_drive
          gdrive_id: 1CPV03S47s0asEJqdAozbNOT1lkgr0YkG

        - path: data/base_layers/terrain_raster_fabdam_pan_india.tif
          source: manual
          note: Pan-India terrain raster used for slope/terrain classification

        - path: data/base_layers/AEZs/Agro_Ecological_Regions.shp
          source: manual
          note: Agro-Ecological Zone boundaries for AEZ-based cluster lookup

        - path: data/base_layers/Microwatershed_v2_with_details.geojson
          source: google_drive
          gdrive_id: 1gwaCrCXq1t3fWyfqcQMw1e7DTlzxoCb3

        - path: data/base_layers/Aquifer_vector.geojson
          source: manual
          note: Pan-India aquifer vector layer

        - path: data/admin-boundary/input/
          source: google_drive
          gdrive_id: 1VqIhB6HrKFDkDnlk1vedcEHhh5fk4f1d
          note: Full admin-boundary archive (~8 GB, 7z); extracted in place

        - path: data/admin-boundary/input/soi_tehsil.geojson
          source: geoserver_wfs
          typename: pan_india_asset:SOI_tehsil_pan_india_dataset
          note: Lightweight bootstrap; also included in the full admin-boundary archive

        - path: data/base_layers/tehsil_watersheds/
          source: derived
          derived_from:
              - data/base_layers/Microwatershed_v2_with_details.geojson
              - data/admin-boundary/input/soi_tehsil.geojson
          note: Per-tehsil watershed .gpkg files; generated by store_watersheds_for_tehsils

        - path: data/base_layers/village_boundaries/
          source: manual
          note: Village boundary files; download source TBD

local_compute_outputs:
    change_detection:
        # change_detection_local.py
        - path: data/change_detection/change_detection_local/{state}/{district}/{block}/
          pattern: "change_{district}_{block}_{param_name}_{start_year}_{end_year}.tif"
          params:
              [
                  Afforestation,
                  Deforestation,
                  Degradation,
                  Urbanization,
                  CropIntensity,
              ]
          geoserver_workspace: change_detection

        # change_detection_vector_local.py
        - path: data/change_detection/change_detection_vector_local/{state}/{district}/{block}/
          pattern: "change_vector_{district}_{block}_{param_name}_{start_year}_{end_year}.gpkg"
          params:
              [
                  Afforestation,
                  Deforestation,
                  Degradation,
                  Urbanization,
                  CropIntensity,
              ]
          geoserver_workspace: change_detection

    lulc:
        # lulc_vector_local.py
        - path: data/lulc/lulc_vector_local/{state}/{district}/{block}/
          pattern: "lulc_vector_{district}_{block}.gpkg"
          geoserver_workspace: lulc_vector

        # lulc_v3_local.py
        - path: data/lulc/lulc_v3_local/{state}/{district}/{block}/
          pattern: "{district}_{block}_{start_year}-07-01_{end_year}-06-30_LULCmap_10m.tif"
          geoserver_workspace: LULC_v3

    lulc_x_terrain:
        # lulc_on_slope_cluster_local.py
        - path: data/lulc_X_terrain/lulc_slope_clusters_local/{state}/{district}/{block}/
          pattern: "{district}_{block}_lulc_slope.gpkg"
          geoserver_workspace: terrain_lulc

    misc:
        # aquifer_vector_local.py
        - path: data/misc/aquifer_vector_local/{state}/{district}/{block}/
          pattern: "aquifer_vector_{district}_{block}.gpkg"
          geoserver_workspace: aquifer
