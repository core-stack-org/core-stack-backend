name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please describe it clearly and check for duplicate issues before submitting.

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submission Checklist
      options:
        - label: I searched existing issues and this is not a duplicate
          required: true
        - label: I have described the problem this feature solves
          required: true

  - type: dropdown
    id: component
    attributes:
      label: Related Component
      options:
        - Bot Interface (/bot_interface)
        - Layer Generation (/computing)
        - DPR (/dpr)
        - Installation (/installation)
        - Plans (/plans)
        - Plantations (/plantations)
        - Moderation (/moderation)
        - Layer stats (/stats_generator)
        - Public API (/public_api)
        - Entire Application
        - Other
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - Low (nice to have)
        - Medium (would improve workflow)
        - High (blocking or critical)
    validations:
      required: true

  - type: textarea
    id: feature_description
    attributes:
      label: Feature Description
      description: What feature would you like to see?
      placeholder: A clear and concise description of the feature you're requesting.
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem it Solves
      description: Why is this feature needed? What pain point does it address?
      placeholder: "Example: As a user, I find it difficult to... / Currently there is no way to..."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered any alternative solutions or workarounds?
      placeholder: Describe any alternatives you've considered or currently use.

  - type: textarea
    id: implementation
    attributes:
      label: Suggested Implementation
      description: How could this feature be implemented?
      placeholder: |
        Example:
        - Add new API endpoint
        - Update GEE utility function
        - Add new celery task

  - type: textarea
    id: diagrams
    attributes:
      label: Diagrams / Mockups
      description: Upload any architectural ideas, flowcharts, or mockups.